services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: lifeos-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./app:/app/app

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3

    restart: unless-stopped
